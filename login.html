<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1f36 0%, #2d3561 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-area h1 {
      font-size: 26px;
      color: #1a1f36;
      font-weight: 700;
    }

    .logo-area p {
      color: #6c7a89;
      font-size: 13px;
      margin-top: 6px;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #007bff;
      border-radius: 50%;
      margin-right: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
      transition: border 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #007bff;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #007bff, #0056d6);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <h1><span class="dot"></span>ATS Portal</h1>
    <p>Recruiter & Admin Login</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <label>Email Address</label>
  <input type="email" id="email" placeholder="you@example.com">

  <label>Password</label>
  <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') doLogin()">

  <button class="btn" id="loginBtn" onclick="doLogin()">Login</button>

  <div class="footer">Powered by Mini ATS</div>
</div>

<script>
  const BASE_URL = "https://mini-ats-0dm3.onrender.com";

  // If already logged in, redirect
  const token = localStorage.getItem("ats_token");
  const role  = localStorage.getItem("ats_role");
  if (token && role) {
    if (role === "admin") window.location.href = "admin.html";
    else window.location.href = "dashboard.html";
  }

  function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");
    const errorEl  = document.getElementById("errorMsg");

    errorEl.style.display = "none";

    if (!email || !password) {
      showError("Please enter email and password");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Logging in...";

    fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        showError(data.error);
        btn.disabled = false;
        btn.textContent = "Login";
        return;
      }

      // Store token and user info
      localStorage.setItem("ats_token",        data.token);
      localStorage.setItem("ats_role",         data.role);
      localStorage.setItem("ats_name",         data.name);
      localStorage.setItem("ats_recruiter_id", data.recruiter_id);

      // Redirect based on role
      if (data.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "dashboard.html";
      }
    })
    .catch(() => {
      showError("Could not connect to server. Please try again.");
      btn.disabled = false;
      btn.textContent = "Login";
    });
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.style.display = "block";
  }
</script>

</body>
</html>
